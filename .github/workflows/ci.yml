name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  e2e-tests:
    name: E2E Tests (Serenity)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradlew
        run: chmod +x ./gradlew

      - name: Run E2E Tests
        run: ./gradlew :ejercicio1E2E:test --info
        env:
          CHROME_ARGS: "--headless --no-sandbox --disable-dev-shm-usage --disable-gpu"
        continue-on-error: true

      - name: Upload Serenity Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: serenity-reports
          path: ejercicio1E2E/target/site/serenity/
          retention-days: 30

      - name: Upload Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-reports
          path: ejercicio1E2E/build/reports/tests/test/
          retention-days: 30

  api-tests:
    name: API Tests (Karate)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: ~/.gradle/caches
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for Gradlew
        run: chmod +x ./gradlew

      - name: Run Karate Tests
        run: ./gradlew :ejercicio2Karate:test

      - name: Upload Karate Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: karate-reports
          path: ejercicio2Karate/build/karate-reports/
          retention-days: 30
